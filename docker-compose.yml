version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ist-africa-auth-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345
      POSTGRES_DB: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ist-africa-backend
    restart: unless-stopped
    ports:
      - "3003:3003"
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: postgres
      DB_SSL: "false"
      NODE_OPTIONS: "--dns-result-order=ipv4first"
    volumes:
      - ./backend/src:/app/src
      - ./backend/uploads:/app/uploads
      - ./backend/config:/app/config
      - ./backend/migrations:/app/migrations
      - ./backend/.sequelizerc:/app/.sequelizerc
      - ./backend/public:/app/public
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: ist-africa-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./Frontend/.env.local
    volumes:
      - ./Frontend/src:/app/src
      - ./Frontend/public:/app/public
      - ./Frontend/.env.local:/app/.env.local
    depends_on:
      - backend

volumes:
  postgres_data:
    driver: local
